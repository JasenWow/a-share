# Hedge Fund Model Configuration
llm:
  model: "glm-4-flash"
  base_url: "https://open.bigmodel.cn/api/paas/v4/"
  api_key_env: "ZHIPU_API_KEY"
  temperature: 0.1
  max_tokens: 2000

agents:
  technicals:
    enabled: true
  valuation:
    enabled: true
  sentiment:
    enabled: true
  fundamentals:
    enabled: false  # Deferred - Qlib lacks A-share financial data

investors:
  enabled:
    - warren_buffett
    - charlie_munger
    - peter_lynch
    - ben_graham
    - phil_fisher
    - bill_ackman
    - michael_burry
    - nassim_taleb
    - cathie_wood
    - aswath_damodaran

news:
  source: "zhipu_websearch"  # Use ZhipuAI's web search capability

risk:
  max_position_weight: 0.25
  stop_loss_threshold: -0.08
  min_confidence: 0.3

workflow:
  signal_aggregation: "weighted_average"
  parallel_agents: true
