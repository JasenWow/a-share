dataset:
  class: DatasetH
  module_path: qlib.data.dataset
  kwargs:
    handler:
      class: Alpha158
      module_path: qlib.contrib.data.handler
      kwargs:
        start_time: "2010-01-01"
        end_time: "2024-12-31"
        instruments: csi300
        freq: day
        fit_start_time: "2010-01-01"
        fit_end_time: "2018-12-31"
        infer_processors: []
        learn_processors:
          - class: DropnaLabel
          - class: CSZScoreNorm
            kwargs:
              fields_group: label
        process_type: "append"
    segments:
      train: ["2010-01-01", "2018-12-31"]
      valid: ["2019-01-01", "2021-12-31"]
      test: ["2022-01-01", "2024-12-31"]
